{% extends "templates/web.html" %}
{% block page_content %}
<!-- BOOKING PAGE VIEW -->
<div id="booking-view" class="page-view">
    <section class="section-padding">
        <div class="container">
            <div class="text-center mb-5">
                <h2 class="section-title">Book Your Appointment</h2>
                <p class="text-muted">Fill in your details below and we'll get back to you to confirm your slot.</p>
            </div>

            <div class="booking-container">
                <form id="appointmentForm" onsubmit="handleBooking(event)">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="firstName" class="form-label">First Name *</label>
                            <input type="text" class="form-control" id="firstName" placeholder="Jane" required>
                        </div>
                        <div class="col-md-6">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastName" placeholder="Doe">
                        </div>
                        <div class="col-md-12">
                            <label for="mobileNo" class="form-label">Mobile Number *</label>
                            <input type="tel" class="form-control" id="mobileNo" placeholder="+1 (555) 000-0000"
                                required>
                        </div>
                        <div class="col-md-12">
                            <label for="gender" class="form-label">Gender</label>
                            <select class="form-select" id="gender">
                                <option selected value="">Select Gender</option>
                                <option value="female">Female</option>
                                <option value="male">Male</option>
                                <option value="other">Other</option>
                                <option value="prefer-not-to-say">Prefer not to say</option>
                            </select>
                        </div>
                        <div class="col-md-12 mt-4">
                            <button type="submit" class="btn btn-booking w-100">Submit Booking</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>
</div>

{% endblock %}
