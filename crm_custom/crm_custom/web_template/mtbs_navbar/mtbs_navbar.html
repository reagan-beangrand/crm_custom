<!-- Navigation -->
<style>
    :root {
        --primary-rose: #8b1d3d;
        --soft-blush: #fff5f6;
        --deep-stone: #2d2a26;
        --nav-pink: #fdf2f4; /* New light pink color for nav */
    }

    .navbar-brand {
        font-family: 'Playfair Display', serif;
    }

    /* Navbar Styling */
    .flex-container {
        display: flex;
        align-items: center;
        /* Vertically centers the items */
        /*background: #f0f0f0;*/
        padding: 10px;
    }

    /* Adjust column widths as needed */
    .column-left {
        flex: 0 0 100px;
        /* Fixed width for logo */
    }

    .column-right {
        flex: 1;
        /* Takes up remaining space */
        overflow: hidden;
        /* Necessary for marquee containment */
    }

    /* CSS Marquee Animation (preferred over the obsolete <marquee> tag) */
    .marquee-wrapper {
        white-space: nowrap;
        animation: scroll 15s linear infinite;
    }

    @keyframes scroll {
        from {
            transform: translateX(100%);
        }

        to {
            transform: translateX(-100%);
        }
    }

    .logo {
        max-height: 50px;
        display: block;
    }

    .navbar {
        /*padding: 1rem 0;*/
        background: var(--nav-pink) !important;
        border-bottom: 1px solid rgba(139, 29, 61, 0.1);
    }

    .navbar-brand {
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--primary-rose) !important;
    }
    .nav-link {
            position: relative;
            color: var(--deep-stone) !important;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        /* Selected/Active Underline Styling */
        .nav-link.active {
            color: var(--primary-rose) !important;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 50%;
            background-color: var(--primary-rose);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-link.active::after,
        .nav-link:hover::after {
            width: 70%;
        }

    .btn-booking {
        background-color: var(--primary-rose);
        color: white;
        border-radius: 50px;
        padding: 0.6rem 1.5rem;
        transition: all 0.3s;
    }

    .btn-booking:hover {
        background-color: #6a162e;
        color: white;
        transform: translateY(-2px);
    }
    .navbar-top {
        top: 0;
        position: fixed;
        width: 100%;
        z-index: 1000;
    }
    .btn-login {
            color: var(--primary-rose);
            border: 2px solid var(--primary-rose);
            border-radius: 50px;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-login:hover {
            background-color: var(--primary-rose);
            color: white;
            transform: translateY(-2px);
        }
        @media (max-width: 768px) {            
            .btn-login {
                margin-right: 0;
                margin-bottom: 10px;
            }
            .nav-link::after {
                display: none; /* Hide underline on mobile for better space usage */
            }
        }
</style>
<nav class="navbar navbar-expand-lg sticky-top  navbar-top ">
    <div class="container">
        <!--<a class="navbar-brand" href="#">GLOW & GRACE</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>-->
        <div class="flex-container">
            <!-- Left Column: Logo -->
            <div class="column-left">
                <img src="/assets/crm_custom/images/logo_whiteBG2.png" alt="Logo" onclick="showPage('home')" class="logo">
            </div>

            <!-- Right Column: Marquee -->
            <div class="column-right">
                <div class="marquee-wrapper navbar-brand">
                    <span class="marquee-text">Makeup Trends Bridal Studio & Academy</span>
                </div>
            </div>
        </div>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link px-3 active" href="javascript:void(0)" onclick="showPage('home', this)">Home</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="#services" onclick="showPage('home', this)">Services</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="#about" onclick="showPage('home', this)">About Us</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="#portfolio" onclick="showPage('home', this)">Portfolio</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="#contact" onclick="showPage('home', this)">Contact</a></li>
            </ul>
            <div class="d-flex flex-column flex-lg-row align-items-center">
                    <a href="/apps" target="_blank" class="btn btn-booking">Login</a>
                    <!--<button class="btn btn-booking" onclick="showPage('booking')">Book Now</button>
                    <a href="/contact" class="btn btn-booking" onclick="showPage('booking')">Book Now</a>-->
            </div>
        </div>
    </div>
</nav>
